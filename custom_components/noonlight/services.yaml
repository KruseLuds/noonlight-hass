create_alarm:
  name: Create Alarm
  description: Notifies Noonlight of an alarm with optional V2 dispatch metadata.
  fields:
    service:
      name: Service
      description: Service that the alarm should call.
      required: true
      example: "police"
      default: "police"
      selector:
        select:
          options:
            - "police"
            - "fire"
            - "medical"
    api_endpoint:
      name: API Endpoint Override
      description: Optional Noonlight API endpoint override for sandbox or production testing.
      required: false
      example: "https://api-sandbox.noonlight.com/dispatch/v1"
      selector:
        text:
    token_endpoint:
      name: Token Endpoint Override
      description: Optional Noonlight token endpoint override.
      required: false
      example: "https://noonlight.konnected.io/ha/token"
      selector:
        text:
    alarm_cause:
      name: Alarm Cause
      description: Human-readable alarm cause or triggering sensor detail to include in dispatch instructions.
      required: false
      example: "Mud room storm door opened"
      selector:
        text:
    instructions:
      name: Instructions
      description: Additional instructions to include with the alarm.
      required: false
      example: "Initial alarm setup, please call so client can verify everything is working."
      selector:
        text:
